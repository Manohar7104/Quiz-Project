<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Quiz App</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container">
      <!-- Welcome Screen -->
      <section id="welcome-screen" class="card active">
        <h1 class="title">Welcome to Quiz App</h1>
        <p class="lead">Enter your name to begin</p>
        <input id="username" type="text" placeholder="Your name" />
        <div class="actions">
          <button id="continue-btn" class="btn">Continue</button>
        </div>
      </section>

      <!-- Subject Selection -->
      <section id="subject-screen" class="card">
        <h2 class="title">Choose Subject</h2>
        <p id="greet-name" class="lead"></p>
        <div class="subjects">
          <button class="subject-btn" data-subject="HTML">HTML</button>
          <button class="subject-btn" data-subject="CSS">CSS</button>
          <button class="subject-btn" data-subject="JavaScript">
            JavaScript
          </button>
          <button class="subject-btn" data-subject="Python">Python</button>
        </div>
        <div class="actions">
          <button id="start-quiz-btn" class="btn btn-primary">
            Start Quiz
          </button>
        </div>
      </section>

      <!-- Quiz Screen -->
      <section id="quiz-screen" class="card">
        <div class="quiz-header">
          <div>
            <h3 id="quiz-title">Quiz</h3>
            <p id="user-info"></p>
          </div>
          <div class="quiz-meta">
            <span id="question-count"></span>
          </div>
        </div>

        <div class="quiz-body">
          <div class="left">
            <div id="question-area">
              <h4 id="question-text"></h4>
              <ul id="options-list" class="options"></ul>
            </div>

            <div class="controls">
              <button id="save-next" class="btn">Save &amp; Next</button>
              <button id="mark-review" class="btn">
                Mark for Review &amp; Next
              </button>
              <button id="clear-answer" class="btn">Clear Answer</button>
              <button id="submit-quiz" class="btn btn-danger">
                Submit Quiz
              </button>
            </div>
          </div>

          <div class="right">
            <h4>Question Palette</h4>
            <div id="palette" class="palette"></div>
          </div>
        </div>
      </section>

      <!-- Result Screen -->
      <section id="result-screen" class="card">
        <h2>Scorecard</h2>
        <p id="score-summary"></p>
        <div id="review-list" class="review-list"></div>
        <div class="actions">
          <button id="restart-btn" class="btn">Take Another Quiz</button>
        </div>
      </section>
    </div>

    <script src="script.js"></script>
  </body>
</html>
